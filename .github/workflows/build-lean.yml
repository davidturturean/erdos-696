name: Build Lean formalization

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Lean toolchain
        run: lean --version

      - name: Cache Mathlib
        run: lake exe cache get

      - name: Build
        run: lake build

      - name: Verify zero sorries
        run: |
          if grep -rEn "^\s*sorry\s*$|sorry$" Erdos696/*.lean Erdos696.lean; then
            echo "Found sorry in source files"
            exit 1
          fi
          echo "OK: zero sorries"
